<!DOCTYPE html>
<html>
  <style>
    .menu-box {
      background-color: #2f6f4e;
      color: white;
      padding: 20px;
      margin: 10px 0;
      text-align: center;
      border-radius: 10px;
      font-size: 18px;
      cursor: pointer;
    }

    #contentText {
      font-size: 22px;
    }

    #contentTitle {
      font-size: 28px;
      font-weight: bold;
    }

    #contentScreen {
      text-align: center;
      padding: 20px;
    }  
</style>
  
<style>
  .menu-box {
  background-color: #2f6f4e;
  color: white;
  padding: 20px;
  margin: 10px 0;
  text-align: center;
  border-radius: 10px;
  font-size: 18px;
  cursor: pointer;

  transition: transform 0.2s, box-shadow 0.2s;
}

.menu-box:hover {
  transform: scale(1.05);
  box-shadow: 0px 6px 15px rgba(0,0,0,0.2);
}

.menu-box:active {
  transform: scale(0.97);
}
</style>
  
</head>
<body>
  <h1>Zoo Explorer</h1>

  <h2>Meerkat 🐾</h2>
  
  <div id="menuScreen">
  <p>Choose what you want to learn:</p>
  <div class="menu-box" onclick="showMenu('discover')">
    🐾 Discover This Animal
  </div>

  <div class="menu-box" onclick="showMenu('quiz')">
    🧠 Quick Quiz
  </div>

  <div class="menu-box" onclick="showMenu('videos')">
    🎥 Watch Videos
  </div>

  <div class="menu-box" onclick="showMenu('photo')">
    📸 Photo Memory
  </div>

  <div class="menu-box" onclick="showMenu('progress')">
    ⭐ My Progress
  </div>  
  </div>
  
  <div id="contentScreen" style="display: none;">

  <h2 id="contentTitle"></h2>
  <p id="contentText"></p>

  <button onclick="goBack()">Back</button>

</div>
 <script>
const questions = [
  {
    question: "What do meerkats eat?",
    options: ["Plants", "Insects", "Fish"],
    correct: 1
  },
  {
    question: "What do meerkats do to protect their group?",
    options: ["Stand guard", "Hide underwater", "Build nests in trees"],
    correct: 0
  },
  {
    question: "Where do meerkats usually live?",
    options: ["Deserts and grasslands", "The ocean", "Snowy mountains"],
    correct: 0
  }
];

function showMenu(choice) {
  document.getElementById("menuScreen").style.display = "none";
  document.getElementById("contentScreen").style.display = "block";

  if (choice === 'discover') {
    window.location.href = "https://lazoo.org/explore-your-zoo/our-animals/mammals/meerkat/";
  }

  else if (choice === 'quiz') {
   document.getElementById("contentText").innerHTML = `
  <p>${q.question}</p>

  <div class="menu-box" onclick="checkAnswer(0, ${q.correct})">
    ${q.options[0]}
  </div>

  <div class="menu-box" onclick="checkAnswer(1, ${q.correct})">
    ${q.options[1]}
  </div>

  <div class="menu-box" onclick="checkAnswer(2, ${q.correct})">
    ${q.options[2]}
  </div>
`;

  else if (choice === 'videos') {
    document.getElementById("contentTitle").innerText = "Watch Videos";
    document.getElementById("contentText").innerHTML =
      '<a href="https://lazoo.org/" target="_blank">Visit the LA Zoo animal page</a>';
  }

  else if (choice === 'photo') {
    document.getElementById("contentTitle").innerText = "Photo Memory";
    document.getElementById("contentText").innerText = "Photo memory feature coming soon!";
  }

  else if (choice === 'progress') {
    document.getElementById("contentTitle").innerText = "My Progress";
    document.getElementById("contentText").innerText =
      "Animals discovered: 0 / 3\nBadges earned: none yet";
  }
}

function checkAnswer(selected, correct) {
  if (selected === correct) {
    document.getElementById("contentText").innerHTML = "Correct! 🎉";
  }
  else {
    document.getElementById("contentText").innerHTML = "Wrong 😅 Try again!";
  }
}

function goBack() {
  document.getElementById("menuScreen").style.display = "block";
  document.getElementById("contentScreen").style.display = "none";
}
</script>
</body>
</html>
