<!DOCTYPE html>
<html>
  <style>
    .menu-box {
      background-color: #2f6f4e;
      color: white;
      padding: 20px;
      margin: 10px 0;
      text-align: center;
      border-radius: 10px;
      font-size: 18px;
      cursor: pointer;
    }

    #contentText {
      font-size: 22px;
    }

    #contentTitle {
      font-size: 28px;
      font-weight: bold;
    }

    #contentScreen {
      text-align: center;
      padding: 20px;
    }  
</style>
  
<style>
  .menu-box {
  background-color: #2f6f4e;
  color: white;
  padding: 20px;
  margin: 10px 0;
  text-align: center;
  border-radius: 10px;
  font-size: 18px;
  cursor: pointer;

  transition: transform 0.2s, box-shadow 0.2s;
}

.menu-box:hover {
  transform: scale(1.05);
  box-shadow: 0px 6px 15px rgba(0,0,0,0.2);
}

.menu-box:active {
  transform: scale(0.97);
}
</style>
  
</head>
<body>
  <h1>Zoo Explorer</h1>

  <h2>Meerkat 🐾</h2>
  <div id="menuScreen">
  <p>Choose what you want to learn:</p>
  <div class="menu-box" onclick="showMenu('discover')">
    🐾 Discover This Animal
  </div>

  <div class="menu-box" onclick="showMenu('quiz')">
    🧠 Quick Quiz
  </div>

  <div class="menu-box" onclick="showMenu('videos')">
    🎥 Watch Videos
  </div>

  <div class="menu-box" onclick="showMenu('photo')">
    📸 Photo Memory
  </div>

  <div class="menu-box" onclick="showMenu('progress')">
    ⭐ My Progress
  </div>

</div>
  <script>
  function showMenu(choice) {
  document.getElementById("menuScreen").style.display = "none";
  document.getElementById("contentScreen").style.display = "block";

if (choice === 'discover') {
  document.getElementById("contentTitle").innerText = "Discover This Animal";
  '<a href="https://lazoo.org/explore-your-zoo/our-animals/mammals/meerkat/" target="_blank">Visit the LA Zoo animal page</a>';
}

else if (choice === 'quiz') {
  document.getElementById("contentTitle").innerText = "Quick Quiz";
  document.getElementById("contentText").innerText = "Quiz feature coming next!";
}

else if (choice === 'videos') {
  document.getElementById("contentTitle").innerText = "Watch Videos";
  document.getElementById("contentText").innerHTML =
    '<a href="https://lazoo.org/" target="_blank">Visit the LA Zoo animal page</a>';
}

else if (choice === 'photo') {
  document.getElementById("contentTitle").innerText = "Photo Memory";
  document.getElementById("contentText").innerText = "Photo memory feature coming soon!";
}

else if (choice === 'progress') {
  document.getElementById("contentTitle").innerText = "My Progress";
  document.getElementById("contentText").innerText = "Animals discovered: 0 / 3\nBadges earned: none yet";
}

function goBack() {
  document.getElementById("menuScreen").style.display = "block";
  document.getElementById("contentScreen").style.display = "none";
}
  }
  </script>
</body>
</html>
