<!DOCTYPE html>
<html>
<head>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
body {
  font-family: 'Poppins', sans-serif;
  background-color: white;
  margin: 0;
}

/* HEADER (LA Zoo style) */
.header {
  background-color: #3573A5;
  padding: 25px 0;
  text-align: center;
  border-bottom: 4px solid #3573A5;
}

.header img {
  width: 300px;
}

/* MAIN CONTENT */
.main-content {
  padding: 20px;
  text-align: center;
}

h1 {
  font-weight: 600;
}

h2 {
  margin-bottom: 10px;
}

p {
  font-size: 22px;
}

/* BUTTONS */
.menu-box {
  background-color: white;
  color: #360805;
  padding: 20px;
  margin: 12px auto;
  width: 80%;
  max-width: 400px;
  text-align: center;
  border-radius: 12px;
  font-size: 18px;
  cursor: pointer;
  border: 2px solid #360805;

  transition: transform 0.2s, box-shadow 0.2s;
}

.menu-box:hover {
  transform: scale(1.05);
  box-shadow: 0px 6px 15px rgba(0,0,0,0.2);
}

.menu-box:active {
  transform: scale(0.97);
}

/* CONTENT SCREEN */
#contentText {
  font-size: 22px;
}

#contentTitle {
  font-size: 28px;
  font-weight: bold;
}

#contentScreen {
  text-align: center;
  padding: 20px;
}
@media (max-width: 600px) {
  .header {
    padding: 35px 0;
  }

  .header img {
    width: 260px;
  }

  .main-content {
    padding: 25px;
  }

  h1 {
    font-size: 34px;
  }

  h2 {
    font-size: 28px;
  }

  p {
    font-size: 24px;
  }

  .menu-box {
    width: 90%;
    max-width: none;
    font-size: 22px;
    padding: 25px;
    margin: 16px auto;
  }
} 

#badgePopup {
  position: fixed;
  top: 50%;
  left: 50%;
  z-index: 9999;
  display: none;
  transform: translate(-50%, -50%);
}

#badgePopup img {
  width: 350px;
  height: auto;
}

.badge-animate {
  display: block !important;
  animation: badgeBounce 2.5s ease-in-out;
}

@keyframes badgeBounce {

  0% {
    transform: translate(-50%, -50%) scale(0);
    opacity: 0;
  }

  20% {
    transform: translate(-50%, -50%) scale(1.2);
    opacity: 1;
  }

  40% {
    transform: translate(-50%, -50%) scale(0.9);
  }

  60% {
    transform: translate(-50%, -50%) scale(1.05);
  }

  80% {
    transform: translate(-50%, -50%) scale(1);
    opacity: 1;
  }

  100% {
    transform: translate(-50%, -50%) scale(0);
    opacity: 0;
  }
}
</style>

</head>

<body>
<div id="badgePopup">
  <img src="badge.png" alt="Zoo Badge">
</div>

<!-- HEADER -->
<div class="header">
  <img src="logo.png" alt="LA Zoo Logo">
</div>

<!-- MAIN CONTENT -->
<div class="main-content">

<h1>Zoo Explorer</h1>
<h2 id="animalName"></h2>

<div id="menuScreen">
  <p>Choose what you want to learn:</p>

  <div class="menu-box" onclick="showMenu('discover')">
    🐾 Discover This Animal
  </div>

  <div class="menu-box" onclick="showMenu('quiz')">
    🧠 Quick Quiz
  </div>

  <div class="menu-box" onclick="showMenu('videos')">
    🎥 Watch Videos
  </div>

  <div class="menu-box" onclick="showMenu('photo')">
    📸 Photo Memory
  </div>

  <div class="menu-box" onclick="showMenu('progress')">
    ⭐ My Progress
  </div>
</div>

<div id="contentScreen" style="display: none;">
  <h2 id="contentTitle"></h2>
  <p id="contentText"></p>
  <button onclick="goBack()">Back</button>
</div>

</div>

<script>

// READ QR CODE URL
const params = new URLSearchParams(window.location.search);
const animal = params.get("animal");

// CHANGE PAGE TITLE BASED ON QR
if (animal === "meerkat") {
  document.getElementById("animalName").innerText = "Meerkat 🐾";
}

else if (animal === "gorilla") {
  document.getElementById("animalName").innerText = "Gorilla 🦍";
}

else if (animal === "flamingo") {
  document.getElementById("animalName").innerText = "Flamingo 🦩";
}

else {
  document.getElementById("animalName").innerText = "Zoo Explorer";
}

// QUIZ QUESTIONS
const questions = [
  {
    question: "What do meerkats eat?",
    options: ["Plants", "Insects", "Fish"],
    correct: 1
  },
  {
    question: "What do meerkats do to protect their group?",
    options: ["Stand guard", "Hide underwater", "Build nests in trees"],
    correct: 0
  },
  {
    question: "Where do meerkats usually live?",
    options: ["Deserts and grasslands", "The ocean", "Snowy mountains"],
    correct: 0
  }
];

// BADGE FUNCTION
function showBadge() {
  const badge = document.getElementById("badgePopup");

  badge.classList.remove("badge-animate");

  void badge.offsetWidth;

  badge.style.display = "block";

  badge.classList.add("badge-animate");

  setTimeout(function() {
    badge.style.display = "none";
  }, 2500);
}

// MENU FUNCTION
function showMenu(choice) {

  document.getElementById("menuScreen").style.display = "none";
  document.getElementById("contentScreen").style.display = "block";

  if (choice === 'discover') {
    window.location.href = "https://lazoo.org/explore-your-zoo/our-animals/mammals/meerkat/";
  }

  else if (choice === 'quiz') {
    document.getElementById("contentTitle").innerText = "Quick Quiz";

    let randomIndex = Math.floor(Math.random() * questions.length);
    let q = questions[randomIndex];

    document.getElementById("contentText").innerHTML = `
      <p>${q.question}</p>

      <div class="menu-box" onclick="checkAnswer(0, ${q.correct})">
        ${q.options[0]}
      </div>

      <div class="menu-box" onclick="checkAnswer(1, ${q.correct})">
        ${q.options[1]}
      </div>

      <div class="menu-box" onclick="checkAnswer(2, ${q.correct})">
        ${q.options[2]}
      </div>
    `;
  }

  else if (choice === 'videos') {
    document.getElementById("contentTitle").innerText = "Watch Videos";

    document.getElementById("contentText").innerHTML =
      '<a href="https://youtu.be/UTkarhKk2qg?si=wD_NFrOFWl3S79u_&t=507" target="_blank">Visit the LA Zoo page</a>';
  }

  else if (choice === 'photo') {
    document.getElementById("contentTitle").innerText = "Photo Memory";

    document.getElementById("contentText").innerText =
      "Photo memory feature coming soon!";
  }

  else if (choice === 'progress') {
    document.getElementById("contentTitle").innerText = "My Progress";

    document.getElementById("contentText").innerText =
      "Animals discovered: 0 / 3\nBadges earned: none yet";
  }
}

// CHECK QUIZ ANSWERS
function checkAnswer(selected, correct) {

  if (selected === correct) {
    document.getElementById("contentText").innerHTML =
      "Correct! 🎉";
  }

  else {
    document.getElementById("contentText").innerHTML =
      "Wrong 😅 Try again!";
  }
}

// GO BACK
function goBack() {
  document.getElementById("menuScreen").style.display = "block";
  document.getElementById("contentScreen").style.display = "none";
}

// SHOW BADGE ON PAGE OPEN
showBadge();

</script>

</body>
</html>
