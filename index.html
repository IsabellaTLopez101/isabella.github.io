<!DOCTYPE html>
<html>
<head>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body {
  font-family: 'Poppins', sans-serif;
  background-color: white;
  margin: 0;
  overflow-x: hidden;
}

/* HEADER */
.header {
  background-color: #3573A5;
  padding: 25px 0;
  text-align: center;
  border-bottom: 4px solid #3573A5;
}

.header img {
  width: 300px;
}

/* MAIN CONTENT */
.main-content {
  padding: 20px;
  text-align: center;
}

h1 {
  font-weight: 600;
}

h2 {
  margin-bottom: 10px;
}

p {
  font-size: 22px;
}

/* BUTTONS */
.menu-box {
  background-color: white;
  color: #360805;
  padding: 20px;
  margin: 12px auto;
  width: 80%;
  max-width: 400px;
  text-align: center;
  border-radius: 12px;
  font-size: 18px;
  cursor: pointer;
  border: 2px solid #360805;
  transition: transform 0.2s, box-shadow 0.2s;
}

.menu-box:hover {
  transform: scale(1.05);
  box-shadow: 0px 6px 15px rgba(0,0,0,0.2);
}

/* BADGE POPUP */
#badgePopup {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  background-color: rgba(0,0,0,0.55);
  display: none;
  justify-content: center;
  align-items: center;
  z-index: 9999;
}

#badgePopup img {
  width: 350px;
  height: auto;
}

.badge-animate {
  display: flex !important;
}

.badge-animate img {
  animation: badgeBounce 2.5s ease-in-out;
}

@keyframes badgeBounce {
  0% {
    opacity: 0;
    transform: scale(0);
  }

  20% {
    opacity: 1;
    transform: scale(1.25);
  }

  35% {
    transform: scale(0.9);
  }

  50% {
    transform: scale(1.1);
  }

  65% {
    transform: scale(0.98);
  }

  80% {
    transform: scale(1);
    opacity: 1;
  }

  100% {
    opacity: 0;
    transform: scale(0);
  }
}

/* LEAF TRANSITION */
#leafTransition {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  background-color: #2f6b2f;
  color: white;
  font-size: 60px;
  display: flex;
  justify-content: center;
  align-items: center;
  z-index: 100000;
  pointer-events: none;
  transform: translateY(-100%);
}

#leafTransition.leaf-transition-active {
  animation: leafCover 1.2s ease-in-out;
}

@keyframes leafCover {
  0% {
    transform: translateY(-100%);
  }

  40% {
    transform: translateY(0);
  }

  60% {
    transform: translateY(0);
  }

  100% {
    transform: translateY(100%);
  }
}

/* QUIZ */
.quiz-options {
  display: flex;
  justify-content: center;
  gap: 25px;
  flex-wrap: wrap;
  margin-top: 20px;
}

.image-option {
  border: 3px solid #360805;
  border-radius: 18px;
  padding: 15px;
  width: 260px;
  cursor: pointer;
  background-color: white;
  transition: transform 0.2s;
}

.image-option:hover {
  transform: scale(1.03);
}

.image-option img {
  width: 100%;
  height: 190px;
  object-fit: cover;
  border-radius: 14px;
}

.image-option p {
  font-size: 22px;
  font-weight: bold;
}

#timerText {
  font-weight: bold;
  color: #3573A5;
  font-size: 26px;
}

#quizResult {
  margin-top: 20px;
  font-size: 28px;
  font-weight: bold;
}

#meerkatWalker {
  width: 100px;
  position: fixed;
  bottom: 40px;
  left: 20px;
  z-index: 999;
  transition: left 1s ease-in-out, top 1s ease-in-out;
}

.jump {
  animation: meerkatJump 0.8s ease-in-out;
}

.run-away {
  animation: meerkatRunAway 1s ease-in-out forwards;
}

@keyframes meerkatJump {
  0% { transform: translateY(0); }
  40% { transform: translateY(-80px); }
  100% { transform: translateY(0); }
}

@keyframes meerkatRunAway {
  0% {
    transform: translateX(0);
    opacity: 1;
  }

  100% {
    transform: translateX(500px);
    opacity: 0;
  }
}

/* MOBILE */
@media (max-width: 600px) {
  .header img {
    width: 230px;
  }

  .menu-box {
    width: 90%;
    font-size: 20px;
    padding: 22px;
  }

  .quiz-options {
    flex-direction: column;
    align-items: center;
  }

  .image-option {
    width: 90%;
  }

  .image-option img {
    height: 220px;
  }

  #badgePopup img {
    width: 300px;
  }

  #meerkatWalker {
    width: 75px;
  }
}
</style>

</head>

<body>

<div id="leafTransition">
  🍃 🍂 🌿 🍃 🍂 🌿
</div>

<div id="badgePopup">
  <img src="badge.png" alt="Zoo Badge">
</div>

<div class="header">
  <img src="logo.png" alt="LA Zoo Logo">
</div>

<div class="main-content">

<h1>Zoo Explorer</h1>
<h2 id="animalName"></h2>

<div id="menuScreen">
  <p>Choose what you want to learn:</p>

  <div class="menu-box" onclick="showMenu('discover')">
    🐾 Discover This Animal
  </div>

  <div class="menu-box" onclick="showMenu('quiz')">
    🧠 Quick Quiz
  </div>

  <div class="menu-box" onclick="showMenu('videos')">
    🎥 Watch Videos
  </div>

  <div class="menu-box" onclick="showMenu('photo')">
    📸 Photo Memory
  </div>

  <div class="menu-box" onclick="showMenu('progress')">
    ⭐ My Progress
  </div>
</div>

<div id="contentScreen" style="display: none;">
  <h2 id="contentTitle"></h2>
  <div id="contentText"></div>
  <button onclick="goBack()">Back</button>
</div>

</div>

<script>
function showBadge() {
  const badge = document.getElementById("badgePopup");

  badge.style.display = "flex";
  badge.classList.remove("badge-animate");

  void badge.offsetWidth;

  badge.classList.add("badge-animate");

  setTimeout(function() {
    badge.style.display = "none";
    badge.classList.remove("badge-animate");
  }, 2500);
}

function playLeafTransition(callback) {
  const leaves = document.getElementById("leafTransition");

  leaves.classList.remove("leaf-transition-active");

  void leaves.offsetWidth;

  leaves.classList.add("leaf-transition-active");

  setTimeout(function() {
    callback();
  }, 500);
}

let timeLeft = 10;
let timer;

const imageQuestion = {
  question: "Which environment helps a meerkat thrive?",
  correct: 0,
  options: [
    {
      text: "Dry Grassland",
      image: "MeerkatsCorrectLive.png",
      result: "Correct! The meerkat thrives here. 🌵"
    },
    {
      text: "Ocean",
      image: "MeerkatWrongOceanlive.png",
      result: "Not quite. Meerkats do not live in the ocean. 🌊"
    },
    {
      text: "Snow",
      image: "MeerkatSnowyWrongLive.png",
      result: "Not quite. Snowy habitats are not ideal for meerkats. ❄️"
    }
  ]
};

function startImageQuiz() {
  clearInterval(timer);

  timeLeft = 10;

  document.getElementById("contentTitle").innerText = "Quick Quiz";

  document.getElementById("contentText").innerHTML = `
    <p>${imageQuestion.question}</p>

    <p id="timerText">Time left: ${timeLeft}</p>

    <div class="quiz-options">

      <div class="image-option" onclick="selectImageAnswer(0)">
        <img src="${imageQuestion.options[0].image}">
        <p>${imageQuestion.options[0].text}</p>
      </div>

      <div class="image-option" onclick="selectImageAnswer(1)">
        <img src="${imageQuestion.options[1].image}">
        <p>${imageQuestion.options[1].text}</p>
      </div>

      <div class="image-option" onclick="selectImageAnswer(2)">
        <img src="${imageQuestion.options[2].image}">
        <p>${imageQuestion.options[2].text}</p>
      </div>

    </div>

    <img id="meerkatWalker" src="Meerkat.png">

    <p id="quizResult"></p>
  `;

  timer = setInterval(function() {

    timeLeft--;

    document.getElementById("timerText").innerText =
      "Time left: " + timeLeft;

    if (timeLeft <= 0) {

      clearInterval(timer);

      document.getElementById("quizResult").innerText =
        "Time's up! ⏰";
    }

  }, 1000);
}

function selectImageAnswer(selected) {

  clearInterval(timer);

  const meerkat = document.getElementById("meerkatWalker");

  const result = document.getElementById("quizResult");

  const options = document.querySelectorAll(".image-option");

  const chosenOption = options[selected];

  const optionBox = chosenOption.getBoundingClientRect();

  meerkat.classList.remove("jump");
  meerkat.classList.remove("run-away");

  meerkat.style.left =
    optionBox.left + optionBox.width / 2 - 50 + "px";

  meerkat.style.top =
    optionBox.bottom + 10 + "px";

  setTimeout(function() {

    if (selected === imageQuestion.correct) {

      meerkat.classList.add("jump");

      result.innerText =
        imageQuestion.options[selected].result;
    }

    else {

      meerkat.classList.add("run-away");

      result.innerText =
        imageQuestion.options[selected].result;
    }

  }, 1000);
}

function showMenu(choice) {

  playLeafTransition(function() {

    clearInterval(timer);

    document.getElementById("menuScreen").style.display = "none";

    document.getElementById("contentScreen").style.display = "block";

    if (choice === "discover") {

      window.location.href =
      "https://lazoo.org/explore-your-zoo/our-animals/mammals/meerkat/";
    }

    else if (choice === "quiz") {

      startImageQuiz();
    }

    else if (choice === "videos") {

      document.getElementById("contentTitle").innerText =
        "Watch Videos";

      document.getElementById("contentText").innerHTML =
        '<a href="https://youtu.be/UTkarhKk2qg?si=wD_NFrOFWl3S79u_&t=507" target="_blank">Watch meerkat video</a>';
    }

    else if (choice === "photo") {

      document.getElementById("contentTitle").innerText =
        "Photo Memory";

      document.getElementById("contentText").innerText =
        "Photo memory feature coming soon!";
    }

    else if (choice === "progress") {

      document.getElementById("contentTitle").innerText =
        "My Progress";

      document.getElementById("contentText").innerText =
        "Animals discovered: 0 / 3\nBadges earned: Meerkat Explorer";
    }

  });
}

function goBack() {
  document.getElementById("menuScreen").style.display = "block";
  document.getElementById("contentScreen").style.display = "none";
}

showBadge();
</script>

</body>
</html>
