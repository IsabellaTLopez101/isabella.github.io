<!DOCTYPE html>
<html>
  <style>
    .menu-box {
      background-color: #2f6f4e;
      color: white;
      padding: 20px;
      margin: 10px 0;
      text-align: center;
      border-radius: 10px;
      font-size: 18px;
      cursor: pointer;
    }

    #contentText {
      font-size: 22px;
    }

    #contentTitle {
      font-size: 28px;
      font-weight: bold;
    }

    #contentScreen {
      text-align: center;
      padding: 20px;
    }
  </style>

</head>
<body>
  <h1>Zoo Explorer</h1>

  <h2>Lion</h2>

  <p>Choose what you want to learn:</p>

<style>
  .menu-box {
    background-color: #2f6f4e;
    color: white;
    padding: 20px;
    margin: 10px 0;
    text-align: center;
    border-radius: 10px;
    font-size: 18px;
    cursor: pointer;
  }
</style>

<h1>Zoo Explorer 🐾</h1>
<h2>Lion</h2>

<div id="menuScreen">

  <p>What would you like to do?</p>

  <div class="menu-box" onclick="showMenu('feeding')">
    Next Feeding Time
  </div>

  <div class="menu-box" onclick="showMenu('info')">
    Animal Information
  </div>

  <div class="menu-box" onclick="showMenu('videos')">
    Watch Videos
  </div>

  <div class="menu-box" onclick="showMenu('photo')">
    Take a Photo Memory
  </div>

</div>

<div id="contentScreen" style="display: none;">

  <h2 id="contentTitle"></h2>
  <p id="contentText"></p>

  <button onclick="goBack()">Back to Menu</button>

</div>
  <script>
  function showMenu(choice) {
  document.getElementById("menuScreen").style.display = "none";
  document.getElementById("contentScreen").style.display = "block";

  if (choice === 'feeding') {
    document.getElementById("contentTitle").innerText = "Feeding Time";
    document.getElementById("contentText").innerText = "Next feeding: 2:30 PM";
  }

  else if (choice === 'info') {
    document.getElementById("contentTitle").innerText = "About the Lion";
    document.getElementById("contentText").innerText =
      "Diet: Carnivore\nHabitat: Savanna\nLifespan: 10–14 years\nFun Fact: Lions live in groups called prides.";
  }

  else if (choice === 'videos') {
    document.getElementById("contentTitle").innerText = "Watch Videos";
    document.getElementById("contentText").innerHTML =
      '<a href="https://lazoo.org/" target="_blank">Click here to watch videos from the LA Zoo</a>';
  }

  else if (choice === 'photo') {
    document.getElementById("contentTitle").innerText = "Photo Memory";
    document.getElementById("contentText").innerText =
      "Camera feature coming next!";
  }
}

function goBack() {
  document.getElementById("menuScreen").style.display = "block";
  document.getElementById("contentScreen").style.display = "none";
}
  </script>
</body>
</html>
