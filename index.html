<!DOCTYPE html>
<html>
<head>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body {
  font-family: 'Poppins', sans-serif;
  background-color: white;
  margin: 0;
  overflow-x: hidden;
}

/* HEADER */
.header {
  background-color: #3573A5;
  padding: 25px 0;
  text-align: center;
  border-bottom: 4px solid #3573A5;
}

.header img {
  width: 300px;
}

/* MAIN CONTENT */
.main-content {
  padding: 20px;
  text-align: center;
  position: relative;
  min-height: 650px;
  overflow: visible;
}



.main-content h1,
.main-content h2,
#menuScreen,
#contentScreen {
  position: relative;
  z-index: 2;
}

h1 {
  font-weight: 600;
}

h2 {
  margin-bottom: 10px;
}

p {
  font-size: 22px;
}

/* BUTTONS */
.menu-box {
  background-color: white;
  color: #360805;
  padding: 20px;
  margin: 12px auto;
  width: 80%;
  max-width: 400px;
  text-align: center;
  border-radius: 12px;
  font-size: 18px;
  cursor: pointer;
  border: 2px solid #360805;
  transition: transform 0.2s, box-shadow 0.2s;
}

.menu-box:hover {
  transform: scale(1.05);
  box-shadow: 0px 6px 15px rgba(0,0,0,0.2);
}

/* BADGE POPUP */
#badgePopup {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  background-color: rgba(0,0,0,0.55);
  display: none;
  justify-content: center;
  align-items: center;
  z-index: 9999;
}

#badgePopup img {
  width: 350px;
  height: auto;
}

.badge-animate {
  display: flex !important;
}

.badge-animate img {
  animation: badgeBounce 2.5s ease-in-out;
}

@keyframes badgeBounce {
  0% {
    opacity: 0;
    transform: scale(0);
  }

  20% {
    opacity: 1;
    transform: scale(1.25);
  }

  35% {
    transform: scale(0.9);
  }

  50% {
    transform: scale(1.1);
  }

  65% {
    transform: scale(0.98);
  }

  80% {
    transform: scale(1);
    opacity: 1;
  }

  100% {
    opacity: 0;
    transform: scale(0);
  }
}

/* LEAF TRANSITION */
#leafTransition {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  background-color: transparent;
  display: none;
  z-index: 100000;
  pointer-events: none;
  overflow: hidden;
}

#leafTransition.leaf-transition-active {
  display: block;
}

.leaf {
  position: absolute;
  width: 520px;
  height: 250px;
  border-radius: 75% 0 75% 0;
  transform-origin: center;
  opacity: 0;
}

.leaf::before {
  content: "";
  position: absolute;
  top: 48%;
  left: 6%;
  width: 88%;
  height: 10px;
  background-color: rgba(220, 210, 85, 0.75);
  border-radius: 999px;
  transform: rotate(8deg);
}

.leaf::after {
  content: "";
  position: absolute;
  top: 25%;
  left: 38%;
  width: 7px;
  height: 130px;
  background-color: rgba(190, 230, 140, 0.45);
  border-radius: 999px;
  transform: rotate(-28deg);
  box-shadow:
    55px 20px 0 rgba(190, 230, 140, 0.35),
    -55px 22px 0 rgba(190, 230, 140, 0.35);
}

#leafTransition.leaf-transition-active .leaf {
  animation: jungleLeafSweep 1.35s ease-in-out forwards;
}

.leaf-one {
  background-color: #2f7d1f;
  top: -18%;
  left: -22%;
  transform: rotate(24deg) scale(0.4);
  animation-delay: 0s;
}

.leaf-two {
  background-color: #5d9627;
  top: -10%;
  right: -25%;
  transform: rotate(-28deg) scale(0.45);
  animation-delay: 0.08s;
}

.leaf-three {
  background-color: #8f9820;
  bottom: -22%;
  right: -18%;
  transform: rotate(18deg) scale(0.45);
  animation-delay: 0.14s;
}

.leaf-four {
  background-color: #0f7f45;
  bottom: -24%;
  left: -20%;
  transform: rotate(-22deg) scale(0.45);
  animation-delay: 0.20s;
}

.leaf-five {
  background-color: #2b681d;
  top: 32%;
  left: -30%;
  transform: rotate(7deg) scale(0.45);
  animation-delay: 0.26s;
}

.leaf-six {
  background-color: #7f8f1e;
  top: 36%;
  right: -32%;
  transform: rotate(-12deg) scale(0.45);
  animation-delay: 0.32s;
}

@keyframes jungleLeafSweep {
  0% {
    opacity: 0;
    translate: 0 0;
    scale: 0.35;
  }

  35% {
    opacity: 1;
    scale: 1.3;
  }

  65% {
    opacity: 1;
    scale: 2.2;
  }

  100% {
    opacity: 0;
    scale: 3.2;
  }
}

#leafTransition.leaf-transition-active .leaf-one {
  animation-name: jungleLeafOne;
}

#leafTransition.leaf-transition-active .leaf-two {
  animation-name: jungleLeafTwo;
}

#leafTransition.leaf-transition-active .leaf-three {
  animation-name: jungleLeafThree;
}

#leafTransition.leaf-transition-active .leaf-four {
  animation-name: jungleLeafFour;
}

#leafTransition.leaf-transition-active .leaf-five {
  animation-name: jungleLeafFive;
}

#leafTransition.leaf-transition-active .leaf-six {
  animation-name: jungleLeafSix;
}

@keyframes jungleLeafOne {
  0% { opacity: 0; transform: translate(-40vw, -20vh) rotate(24deg) scale(0.4); }
  35% { opacity: 1; transform: translate(10vw, 20vh) rotate(18deg) scale(1.4); }
  70% { opacity: 1; transform: translate(28vw, 34vh) rotate(12deg) scale(2.4); }
  100% { opacity: 0; transform: translate(55vw, 60vh) rotate(6deg) scale(3.3); }
}

@keyframes jungleLeafTwo {
  0% { opacity: 0; transform: translate(40vw, -25vh) rotate(-28deg) scale(0.45); }
  35% { opacity: 1; transform: translate(-8vw, 15vh) rotate(-18deg) scale(1.45); }
  70% { opacity: 1; transform: translate(-25vw, 28vh) rotate(-10deg) scale(2.5); }
  100% { opacity: 0; transform: translate(-55vw, 54vh) rotate(-4deg) scale(3.4); }
}

@keyframes jungleLeafThree {
  0% { opacity: 0; transform: translate(34vw, 36vh) rotate(18deg) scale(0.45); }
  35% { opacity: 1; transform: translate(-12vw, -2vh) rotate(12deg) scale(1.5); }
  70% { opacity: 1; transform: translate(-28vw, -18vh) rotate(8deg) scale(2.7); }
  100% { opacity: 0; transform: translate(-58vw, -45vh) rotate(4deg) scale(3.5); }
}

@keyframes jungleLeafFour {
  0% { opacity: 0; transform: translate(-34vw, 34vh) rotate(-22deg) scale(0.45); }
  35% { opacity: 1; transform: translate(8vw, -4vh) rotate(-15deg) scale(1.5); }
  70% { opacity: 1; transform: translate(26vw, -20vh) rotate(-9deg) scale(2.7); }
  100% { opacity: 0; transform: translate(58vw, -48vh) rotate(-3deg) scale(3.5); }
}

@keyframes jungleLeafFive {
  0% { opacity: 0; transform: translate(-42vw, 0) rotate(7deg) scale(0.45); }
  35% { opacity: 1; transform: translate(12vw, 0) rotate(5deg) scale(1.55); }
  70% { opacity: 1; transform: translate(34vw, 0) rotate(2deg) scale(2.7); }
  100% { opacity: 0; transform: translate(70vw, 0) rotate(0deg) scale(3.5); }
}

@keyframes jungleLeafSix {
  0% { opacity: 0; transform: translate(42vw, 4vh) rotate(-12deg) scale(0.45); }
  35% { opacity: 1; transform: translate(-12vw, 0) rotate(-8deg) scale(1.55); }
  70% { opacity: 1; transform: translate(-34vw, 0) rotate(-4deg) scale(2.7); }
  100% { opacity: 0; transform: translate(-70vw, 0) rotate(0deg) scale(3.5); }
}

/* QUIZ */
.quiz-options {
  display: flex;
  justify-content: center;
  gap: 25px;
  flex-wrap: wrap;
  margin-top: 20px;
}

.image-option {
  border: 3px solid #360805;
  border-radius: 18px;
  padding: 15px;
  width: 260px;
  cursor: pointer;
  background-color: white;
  transition: transform 0.2s;
}

.image-option:hover {
  transform: scale(1.03);
}

.image-option img {
  width: 100%;
  height: 190px;
  object-fit: cover;
  border-radius: 14px;
}

.image-option p {
  font-size: 22px;
  font-weight: bold;
}

#timerText {
  font-weight: bold;
  color: #3573A5;
  font-size: 26px;
}

#quizResult {
  margin-top: 20px;
  font-size: 28px;
  font-weight: bold;
}

/* PHOTO MEMORY */
.photo-memory-box {
  max-width: 500px;
  margin: 0 auto;
  text-align: center;
}

#cameraPreview {
  width: 100%;
  max-width: 420px;
  border-radius: 18px;
  border: 3px solid #360805;
  background-color: #eee;
  display: none;
}

#photoCanvas {
  display: none;
}

#capturedPhoto {
  width: 100%;
  max-width: 420px;
  border-radius: 18px;
  border: 3px solid #3573A5;
  margin-top: 15px;
  display: none;
}

.camera-button {
  background-color: #3573A5;
  color: white;
  padding: 16px 22px;
  margin: 10px auto;
  border: none;
  border-radius: 12px;
  font-size: 18px;
  font-weight: bold;
  cursor: pointer;
  display: block;
}

.camera-button:hover {
  transform: scale(1.03);
}

.memory-gallery {
  display: flex;
  justify-content: center;
  flex-wrap: wrap;
  gap: 16px;
  margin-top: 20px;
}

.memory-card {
  width: 160px;
  border: 3px solid #360805;
  border-radius: 15px;
  padding: 10px;
  background-color: white;
}

.memory-card img {
  width: 100%;
  height: 120px;
  object-fit: cover;
  border-radius: 10px;
}

.memory-card p {
  font-size: 14px;
  margin: 6px 0 0 0;
}

/* PROGRESS BADGES */
.badge-lineup {
  display: flex;
  justify-content: center;
  align-items: center;
  gap: 20px;
  flex-wrap: wrap;
  margin-top: 20px;
}

.collected-badge {
  text-align: center;
}

.collected-badge img {
  width: 120px;
  height: auto;
  display: block;
  margin: 0 auto 8px auto;
}

.collected-badge p {
  font-size: 18px;
  font-weight: bold;
  margin: 0;
}

.empty-progress {
  font-size: 20px;
  color: #555;
  margin-top: 20px;
}

#meerkatWalker {
  width: 150px;
  position: fixed;
  bottom: 40px;
  left: 20px;
  z-index: 999;
  transition: left 1s ease-in-out, top 1s ease-in-out;
}

.jump {
  animation: meerkatJump 0.8s ease-in-out;
}

.run-away {
  animation: meerkatRunAway 1s ease-in-out forwards;
}

@keyframes meerkatJump {
  0% { transform: translateY(0); }
  40% { transform: translateY(-80px); }
  100% { transform: translateY(0); }
}

@keyframes meerkatRunAway {
  0% {
    transform: translateX(0);
    opacity: 1;
  }

  100% {
    transform: translateX(500px);
    opacity: 0;
  }
}

/* MOBILE */
@media (max-width: 600px) {
  #meerkatWalker {
    width: 140px;
  }
}
</style>

</head>

<body>



<div id="leafTransition">
  <div class="leaf leaf-one"></div>
  <div class="leaf leaf-two"></div>
  <div class="leaf leaf-three"></div>
  <div class="leaf leaf-four"></div>
  <div class="leaf leaf-five"></div>
  <div class="leaf leaf-six"></div>
</div>

<div id="badgePopup">
  <img src="badge.png" alt="Zoo Badge">
</div>

<div class="header">
  <img src="logo.png" alt="LA Zoo Logo">
</div>

<div class="main-content">



<h1>Zoo Explorer</h1>
<h2 id="animalName"></h2>

<div id="menuScreen">
  <p>Choose what you want to learn:</p>

  <div class="menu-box" onclick="showMenu('discover')">
    🐾 Discover This Animal
  </div>

  <div class="menu-box" onclick="showMenu('quiz')">
    🧠 Quick Quiz
  </div>

  <div class="menu-box" onclick="showMenu('videos')">
    🎥 Watch Videos
  </div>

  <div class="menu-box" onclick="showMenu('photo')">
    📸 Photo Memory
  </div>

  <div class="menu-box" onclick="showMenu('progress')">
    ⭐ My Progress
  </div>

  <div class="menu-box" onclick="resetProgress()">
    🛠 Reset Debug Progress
  </div>
</div>

<div id="contentScreen" style="display: none;">
  <h2 id="contentTitle"></h2>
  <div id="contentText"></div>
  <button onclick="goBack()">Back</button>
</div>

</div>

<script>
const params = new URLSearchParams(window.location.search);
const animal = params.get("animal") || "meerkat";

let discoveredAnimals =
  JSON.parse(localStorage.getItem("discoveredAnimals")) || [];

function showBadge() {
  const badge = document.getElementById("badgePopup");

  badge.style.display = "flex";
  badge.classList.remove("badge-animate");

  void badge.offsetWidth;

  badge.classList.add("badge-animate");

  setTimeout(function() {
    badge.style.display = "none";
    badge.classList.remove("badge-animate");
  }, 2500);
}

function playLeafTransition(callback) {
  const leaves = document.getElementById("leafTransition");

  leaves.classList.remove("leaf-transition-active");

  void leaves.offsetWidth;

  leaves.classList.add("leaf-transition-active");

  setTimeout(function() {
    callback();
  }, 500);
}

let timeLeft = 10;
let timer;
let cameraStream = null;

const imageQuestion = {
  question: "Which environment helps a meerkat thrive?",
  correct: 0,
  options: [
    {
      text: "Dry Grassland",
      image: "MeerkatsCorrectLive.png",
      result: "Correct! The meerkat thrives here. 🌵"
    },
    {
      text: "Ocean",
      image: "MeerkatWrongOceanlive.png",
      result: "Not quite. Meerkats do not live in the ocean. 🌊"
    },
    {
      text: "Snow",
      image: "MeerkatSnowyWrongLive.png",
      result: "Not quite. Snowy habitats are not ideal for meerkats. ❄️"
    }
  ]
};

function startImageQuiz() {
  clearInterval(timer);

  timeLeft = 10;

  document.getElementById("contentTitle").innerText = "Quick Quiz";

  document.getElementById("contentText").innerHTML = `
    <p>${imageQuestion.question}</p>

    <p id="timerText">Time left: ${timeLeft}</p>

    <div class="quiz-options">

      <div class="image-option" onclick="selectImageAnswer(0)">
        <img src="${imageQuestion.options[0].image}">
        <p>${imageQuestion.options[0].text}</p>
      </div>

      <div class="image-option" onclick="selectImageAnswer(1)">
        <img src="${imageQuestion.options[1].image}">
        <p>${imageQuestion.options[1].text}</p>
      </div>

      <div class="image-option" onclick="selectImageAnswer(2)">
        <img src="${imageQuestion.options[2].image}">
        <p>${imageQuestion.options[2].text}</p>
      </div>

    </div>

    <img id="meerkatWalker" src="Meerkat.png">

    <p id="quizResult"></p>
  `;

  timer = setInterval(function() {

    timeLeft--;

    document.getElementById("timerText").innerText =
      "Time left: " + timeLeft;

    if (timeLeft <= 0) {

      clearInterval(timer);

      document.getElementById("quizResult").innerText =
        "Time's up! ⏰";
    }

  }, 1000);
}

function selectImageAnswer(selected) {

  clearInterval(timer);

  const meerkat = document.getElementById("meerkatWalker");
  const result = document.getElementById("quizResult");
  const options = document.querySelectorAll(".image-option");
  const chosenOption = options[selected];
  const optionBox = chosenOption.getBoundingClientRect();

  options.forEach(function(option) {
    option.style.pointerEvents = "none";
  });

  meerkat.classList.remove("jump");
  meerkat.classList.remove("run-away");

  meerkat.style.left =
    optionBox.left + optionBox.width / 2 - 50 + "px";

  meerkat.style.top =
    optionBox.bottom + 10 + "px";

  setTimeout(function() {

    if (selected === imageQuestion.correct) {

      meerkat.classList.add("jump");

      result.innerText =
        imageQuestion.options[selected].result;

      if (!discoveredAnimals.includes(animal)) {

        discoveredAnimals.push(animal);

        localStorage.setItem(
          "discoveredAnimals",
          JSON.stringify(discoveredAnimals)
        );

        showBadge();

        // Badge now only appears when a new animal is discovered
      }
    }

    else {

      meerkat.classList.add("run-away");

      result.innerText =
        imageQuestion.options[selected].result;
    }

  }, 1000);
}

function startPhotoMemory() {

  document.getElementById("contentTitle").innerText = "Photo Memory";

  document.getElementById("contentText").innerHTML = `
    <div class="photo-memory-box">
      <p>Take a zoo memory photo for this animal.</p>

      <button class="camera-button" onclick="openCamera()">
        Open Camera
      </button>

      <video id="cameraPreview" autoplay playsinline></video>

      <button class="camera-button" onclick="takePhoto()">
        Take Photo
      </button>

      <canvas id="photoCanvas"></canvas>

      <img id="capturedPhoto" alt="Captured zoo memory">

      <div id="photoActions" style="display:none;">
        <button class="camera-button" onclick="downloadPhoto()">
          📸 Save To Gallery
        </button>

        <button class="camera-button" onclick="discardPhoto()">
          ❌ Discard Photo
        </button>
      </div>
    </div>
  `;
}

function openCamera() {

  const video = document.getElementById("cameraPreview");

  if (!navigator.mediaDevices || !navigator.mediaDevices.getUserMedia) {
    alert("Camera is not supported in this browser.");
    return;
  }

  navigator.mediaDevices.getUserMedia({
    video: {
      facingMode: "environment"
    },
    audio: false
  })
  .then(function(stream) {
    cameraStream = stream;
    video.srcObject = stream;
    video.style.display = "block";
  })
  .catch(function(error) {
    alert("Camera permission was blocked or unavailable.");
  });
}

function takePhoto() {

  const video = document.getElementById("cameraPreview");
  const canvas = document.getElementById("photoCanvas");
  const capturedPhoto = document.getElementById("capturedPhoto");

  if (!cameraStream) {
    alert("Open the camera first.");
    return;
  }

  canvas.width = video.videoWidth;
  canvas.height = video.videoHeight;

  const context = canvas.getContext("2d");

  context.drawImage(video, 0, 0, canvas.width, canvas.height);

  const borderImage = new Image();
  borderImage.src = "Border.png";

  borderImage.onload = function() {
    context.drawImage(borderImage, 0, 0, canvas.width, canvas.height);

    const photoData = canvas.toDataURL("image/png");

    capturedPhoto.src = photoData;
    capturedPhoto.style.display = "block";

    document.getElementById("photoActions").style.display = "block";
  };

  borderImage.onerror = function() {
    alert("Border.png could not load. Make sure the file name is exactly Border.png in GitHub.");

    const photoData = canvas.toDataURL("image/png");

    capturedPhoto.src = photoData;
    capturedPhoto.style.display = "block";

    document.getElementById("photoActions").style.display = "block";
  };
}

function downloadPhoto() {

  const capturedPhoto = document.getElementById("capturedPhoto");

  if (!capturedPhoto.src) {
    alert("Take a photo first.");
    return;
  }

  const downloadLink = document.createElement("a");

  downloadLink.href = capturedPhoto.src;

  downloadLink.download = `${animal}-zoo-memory.png`;

  document.body.appendChild(downloadLink);

  downloadLink.click();

  document.body.removeChild(downloadLink);

  alert("Photo downloaded to your device gallery/downloads.");
}

function discardPhoto() {

  const capturedPhoto = document.getElementById("capturedPhoto");

  capturedPhoto.src = "";
  capturedPhoto.style.display = "none";

  document.getElementById("photoActions").style.display = "none";
}

function showMenu(choice) {

  playLeafTransition(function() {

    clearInterval(timer);

    document.getElementById("menuScreen").style.display = "none";

    document.getElementById("contentScreen").style.display = "block";

    if (choice === "discover") {

      window.location.href =
      "https://lazoo.org/explore-your-zoo/our-animals/mammals/meerkat/";
    }

    else if (choice === "quiz") {

      startImageQuiz();
    }

    else if (choice === "videos") {

      window.location.href =
        "https://youtu.be/UTkarhKk2qg?si=wD_NFrOFWl3S79u_&t=507";
    }

    else if (choice === "photo") {

      startPhotoMemory();
    }

    else if (choice === "progress") {

      document.getElementById("contentTitle").innerText =
        "My Progress";

      let badgeHTML = "";

      if (discoveredAnimals.length > 0) {
        discoveredAnimals.forEach(function(foundAnimal) {
          badgeHTML += `
            <div class="collected-badge">
              <img src="badge.png" alt="${foundAnimal} Badge">
              <p>${foundAnimal}</p>
            </div>
          `;
        });
      }

      else {
        badgeHTML = `
          <p class="empty-progress">No badges collected yet. Complete a quiz to earn one!</p>
        `;
      }

      document.getElementById("contentText").innerHTML = `
        <p>Animals discovered: ${discoveredAnimals.length} / 3</p>

        <div class="badge-lineup">
          ${badgeHTML}
        </div>
      `;
    }

  });
}

function goBack() {
  clearInterval(timer);

  if (cameraStream) {
    cameraStream.getTracks().forEach(function(track) {
      track.stop();
    });

    cameraStream = null;
  }

  document.getElementById("menuScreen").style.display = "block";
  document.getElementById("contentScreen").style.display = "none";
}

function resetProgress() {

  localStorage.removeItem("discoveredAnimals");

  discoveredAnimals = [];

  alert("Debug progress reset!");
}

// badge trigger removed on page load
</script>

</body>
</html>
